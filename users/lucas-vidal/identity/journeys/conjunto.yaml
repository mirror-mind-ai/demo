context: |
  # Conjunto

  **Etapa atual:** v0.2.0 lançada em 15/05/2026 (Editorial — refino
  tipográfico, retratos duotone, marca de leitura, sumário sticky em
  docs longos). Antes dela, v0.1.0 (12/05/2026) fechou o CV0.E1 —
  Tracer Bullet com os sete fundadores cadastrados e fios abertos.

  > A v0.2.0 saiu como MINOR para uma série editorial fora de
  > roadmap que, pela regra estrita de versioning.md, era PATCH.
  > Anomalia reconhecida e registrada em decisions.md → D8. A partir
  > daqui voltamos à regra.

  CV0.E2 (Engajamento) em curso — indicador de última vez online é
  a próxima story. Sai isolada → v0.2.1 (PATCH). Epic fecha em
  v0.3.0 (MINOR) quando S1+S2+S3 estiverem prontas.

  **Método de trabalho:** o método deste projeto vive em
  `docs/process/` (development-guide, triad, expand-collapse,
  versioning, release-notes). Leio essas referências antes de
  trabalhar na story e respeito o ciclo de 8 passos com a disciplina
  de pausa por checkpoint declarada lá. Não reproduzo aqui as regras
  do método — elas são do projeto, não desta travessia.

  **Próximo MAJOR — CV2 (Abertura externa):** auth real via magic
  link, pagamento via Stripe, cadastro pela UI para os primeiros
  assinantes além dos sete fundadores. Não mais codificado como
  "v0.2.0" (já consumido pelo Editorial — ver D8). Pela regra de
  versioning.md, será o primeiro MAJOR bump do produto (v1.0.0).

  ## O que é

  Plataforma de comunidade fechada e curada para líderes técnicos. Membros
  pagam mensalidade. Em troca, têm acesso a três coisas:

  - Encontros mensais ao vivo, em grupo pequeno, conduzidos por Lucas, com
    foco em casos reais que cada um traz.
  - Biblioteca curada de conteúdo (artigos próprios e selecionados,
    transcrições de encontros anteriores, notas de leitura).
  - Espaço assíncrono de conversa entre os membros, moderado pelo Lucas,
    estruturado por tema (não tem timeline tipo feed; tem fios que
    persistem).

  Não é Slack aberto. Não é curso. Não é newsletter premium. O equivalente
  mais próximo seria uma residência intelectual mensal com pares.

  ## Stack técnico

  **MVP atual (v0.2.0), por design — stack inalterado desde v0.1.0:**

  - TypeScript em todo lugar.
  - Hono como framework HTTP, com HTML server-rendered (sem SPA, sem
    hidratação).
  - better-sqlite3 como banco (single-file SQLite, journal mode WAL).
  - marked para renderizar o markdown dos docs dentro do próprio app.
  - vitest para testes.
  - Hospedagem local por enquanto (`npm run dev`).

  **Por que esse stack e não Next.js + tRPC + Prisma desde o início:**
  decisão registrada em `docs/project/briefing.md → D1 (Boring stack
  first)`. Construtor solo paga caro por stack sofisticado em MVP. O
  custo é cognitivo (toda decisão técnica em estágio inicial
  multiplica), e o benefício só aparece quando há escala. O artigo do
  blog "boring stack ganha quando o builder é solo" registra o
  mesmo princípio.

  **Próximo MAJOR de produto (CV2 — Abertura externa):** auth real
  (magic link via email) + pagamento via Stripe + abertura externa
  para a primeira leva fora dos sete fundadores. Stack continua o
  mesmo. Versão exata depende de quantos epics fecham antes; pela
  regra de versioning.md, MAJOR bump (v1.0.0) marca o atravessamento
  do primeiro CV inteiro entregue.

  **Plano para Next.js + tRPC + Prisma + PostgreSQL:** migração
  considerada quando houver mais de doze assinantes pagantes por
  mais de seis meses contínuos. Sinais que vou observar para tomar essa
  decisão: latência da rota /threads passando de 200ms com >5000
  mensagens, necessidade de tipos compartilhados front-back que HTML
  server-rendered não cobre, time crescendo (saindo de solo).

  ## Decisões já tomadas

  - **Stack escolhido boring por design** (TypeScript + Hono +
    better-sqlite3 + HTML server-rendered): construtor solo paga
    caro por stack sofisticado em estágio MVP. Next.js + tRPC +
    Prisma fica no plano de v0.3.0+ quando houver tração validada.
    Decisão D1 do briefing.
  - **Modelo de membership recorrente**, não venda única.
  - **Comunidade fechada**, com curadoria de entrada (entrevista
    rápida), não open signup.
  - **Sem feed**, sem timeline. Conversa é em fios temáticos.
  - **Encontros não ficam gravados**. Decisão deliberada para preservar
    a natureza efêmera e a confidencialidade.
  - **Tamanho de cada grupo limitado a doze pessoas** por encontro.
  - **Preço inicial não decidido**, mas faixa estudada é R$ 290 a R$ 490
    mensais.

  ## Decisões em aberto

  - **Preço final** (faixa estudada, mas não cravada).
  - **Lançamento como B2C ou B2B**. B2C é mais coerente com o que Lucas
    quer servir. B2B (empresas pagando por seus líderes) traz volume mas
    distorce a relação.
  - **Sócia ou solo.** Tatiana Lara, designer de produto, é candidata a
    sócia. Conversa em andamento, sem decisão.
  - **Quando abrir inscrições para fora do Sustentação.** Os sete são
    fundadores. Depois disso, abrir para a lista do blog em ondas? Por
    referência? Convite direto?
  - **Velocidade de produção de conteúdo curado**, dado que Lucas é a
    fonte e tem outras frentes ativas.

  ## Tensões internas

  A maior é o conflito entre a Conjunto e a Klar. A Klar paga as contas;
  a Conjunto é a aposta. A renovação da Klar em cima da mesa amplifica a
  tensão: se ele aceitar, a Conjunto fica em ritmo mínimo por mais um
  ano.

  A segunda é solidão de construção. Construir sozinho deixa cada decisão
  pendente em loop interno, sem voz que contraponha. Daniel Marques é
  presença ocasional. Tatiana, se entrar, mudaria isso.

  A terceira é o conflito entre coerência e tração. Cada vez que Lucas
  pensa em acelerar a Conjunto (mais marketing, mais conteúdo, mais
  tamanho de grupo, mais sessões por mês), bate na tensão de que isso
  empurraria a oferta para um lugar que ele recusa: comunidade-produto
  de consumo, em vez de residência intelectual.

  ## Roadmap

  **v0.1.0 — CV0.E1 — Tracer Bullet** ✅ lançada em 12/05/2026.
  Servidor rodável, sete fundadores cadastrados, fios persistentes,
  docs navegada dentro do app.

  **v0.2.1 — CV0.E2.S1 — last-seen** 🔵 próxima. Indicador de última
  vez online no perfil dos membros, saindo isolada como PATCH.
  Indicador de leitura por mensagem (S2 → v0.2.2) e lista de membros
  por atividade (S3) seguem em planejado. **Fechamento do epic
  CV0.E2 → v0.3.0 (MINOR).**

  **CV2 — Abertura externa.** Auth real via magic link, pagamento
  via Stripe, cadastro de novo membro pela UI, criação de fio pela
  UI, postagem em fio pela UI, abertura para a primeira leva além
  dos sete fundadores. Versão exata segue a regra de versioning.md
  (não mais codificada como "v0.2.0", que já foi consumida pelo
  Editorial — ver D8).

  **Migração de stack futura.** Next.js + tRPC + Prisma + PostgreSQL
  quando houver mais de doze assinantes pagantes por mais de seis
  meses contínuos.

  Detalhe completo, com stories e indíces, em
  `docs/project/roadmap/index.md` dentro do projeto.

  ## O que está fora do escopo

  - Mobile nativo. Mobile web suficiente.
  - Feed de notificações por push. Email basta.
  - Chat em tempo real. Conversa é assíncrona em fios.
  - Vídeo gravado dos encontros. Decisão explícita, não falta.
