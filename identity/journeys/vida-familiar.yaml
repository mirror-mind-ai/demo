description: >
  Travessia da vida com Marina e Olívia. Não é "área pessoal isolada do
  trabalho"; é a restrição estrutural que atravessa toda decisão profissional.

briefing: >
  Ativa para qualquer assunto envolvendo Marina, Olívia, ritmo doméstico,
